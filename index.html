<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsul Family</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:linear-gradient(90deg,#4facfe,#00c6fb);
    color:white;
    text-align:center;
    padding:35px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

.container{
    width:90%;
    max-width:1300px;
    margin:40px auto;
}

.family{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card h2{
    color:#2196F3;
    margin:15px 0;
}

.card p{
    color:#555;
    padding-bottom:20px;
}

a{
    text-decoration:none;
    color:inherit;
}

footer{
    margin-top:50px;
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

</style>

</head>
<body>

<header>

<h1>Welcome To</h1>
<h1>Samsul Family</h1>

<p>Klik foto untuk melihat profil lengkap.</p>

</header>
